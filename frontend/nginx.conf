server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # In production, the outer proxy-nginx routes /api/* to the backend before
    # requests reach this container. In local dev, Vite's dev server proxies
    # /api/ directly (see vite.config.ts). So this container only serves static.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
