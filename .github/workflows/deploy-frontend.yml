name: Deploy · Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-west-2
  ECR_NGINX: formulation-ai-nginx
  CONTAINER_NGINX: formulation-ai-nginx
  NGINX_PORT: "8082"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push frontend (nginx)
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f frontend/Dockerfile \
            -t $ECR_REGISTRY/$ECR_NGINX:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_NGINX:latest \
            .
          docker push $ECR_REGISTRY/$ECR_NGINX:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_NGINX:latest

      - name: Deploy frontend via SSM
        id: ssm
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="$ECR_REGISTRY/$ECR_NGINX:$IMAGE_TAG"
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 300 \
            --parameters commands='[
              "set -e",
              "echo === Pulling image ===",
              "aws ecr get-login-password --region '"$AWS_REGION"' | docker login --username AWS --password-stdin '"$ECR_REGISTRY"'",
              "docker pull '"$IMAGE"'",
              "echo === Stopping old container ===",
              "docker stop '"$CONTAINER_NGINX"' 2>/dev/null || echo No old container",
              "echo === Starting new container ===",
              "docker rm '"$CONTAINER_NGINX"' 2>/dev/null || true",
              "docker run -d --name '"$CONTAINER_NGINX"' --restart unless-stopped -p 127.0.0.1:'"$NGINX_PORT"':80 '"$IMAGE"'",
              "echo === Health-checking ===",
              "for i in 1 2 3 4 5 6; do curl -sf http://127.0.0.1:'"$NGINX_PORT"'/ -o /dev/null && echo Nginx OK && break; echo Attempt $i, waiting 5s...; sleep 5; done",
              "if curl -sf http://127.0.0.1:'"$NGINX_PORT"'/ -o /dev/null; then",
              "  echo === Deploy successful, cleaning up old images ===",
              "  docker image prune -af",
              "else",
              "  echo === FAILED: rolling back to previous image ===",
              "  docker logs --tail 30 '"$CONTAINER_NGINX"' 2>/dev/null",
              "  docker rm -f '"$CONTAINER_NGINX"'",
              "  docker run -d --name '"$CONTAINER_NGINX"' --restart unless-stopped -p 127.0.0.1:'"$NGINX_PORT"':80 791342033319.dkr.ecr.us-west-2.amazonaws.com/formulation-ai-nginx:latest",
              "  echo === Rollback complete ===",
              "  exit 1",
              "fi",
              "echo === Deploy complete ==="
            ]' \
            --query 'Command.CommandId' \
            --output text)
          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for frontend deployment
        env:
          COMMAND_ID: ${{ steps.ssm.outputs.command_id }}
        run: |
          for i in $(seq 1 120); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query 'Status' --output text 2>/dev/null || echo "Pending")
            case "$STATUS" in
              Success)
                aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "${{ secrets.EC2_INSTANCE_ID }}" --query 'StandardOutputContent' --output text
                exit 0 ;;
              Failed|TimedOut|Cancelled)
                echo "--- STDOUT ---"
                aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "${{ secrets.EC2_INSTANCE_ID }}" --query 'StandardOutputContent' --output text
                echo "--- STDERR ---"
                aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "${{ secrets.EC2_INSTANCE_ID }}" --query 'StandardErrorContent' --output text
                exit 1 ;;
              *) sleep 5 ;;
            esac
          done
          echo "Timed out waiting for SSM command"; exit 1
